<!doctype html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0b0f14" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>텔로 음성 조종</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
  html, body { -webkit-tap-highlight-color: transparent; }
  body { -webkit-user-select: none; user-select: none; }

  /* Fixed emergency header safe-area padding */
  #topbar { padding-top: calc(env(safe-area-inset-top, 0px) + 0.5rem); }

  /* ---- JS-toggled status dot (setConnState / device state) ---- */
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-base-content); opacity: 0.4; flex: 0 0 auto; }
  .dot.on   { background: var(--color-success); opacity: 1; box-shadow: 0 0 6px var(--color-success); }
  .dot.off  { background: var(--color-error);   opacity: 1; }
  .dot.warn { background: var(--color-warning);  opacity: 1; }

  /* ---- Mic button JS states (recording / starting) ---- */
  #micBtn.recording {
    box-shadow: 0 0 0 4px color-mix(in oklch, var(--color-error) 30%, transparent),
                0 0 24px color-mix(in oklch, var(--color-error) 45%, transparent);
    animation: pulse 1s infinite ease-in-out;
  }
  #micBtn.starting { opacity: 0.7; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(0.99); } }

  /* ---- Command log lines (createElement in JS) ---- */
  #log { -webkit-user-select: text; user-select: text; -webkit-overflow-scrolling: touch; }
  .logline { padding: 3px 4px; border-bottom: 1px solid var(--color-base-300); white-space: pre-wrap; word-break: break-word; }
  .logline .t { opacity: 0.6; }
  .logline.sent  { color: var(--color-info); }
  .logline.ok    { color: var(--color-success); }
  .logline.fail  { color: var(--color-error); }
  .logline.err   { color: var(--color-error); }
  .logline.info  { opacity: 0.7; }
  .logline.parse { color: var(--color-warning); }
  .logline .cmd  { font-weight: 600; }
  .logline .caret { display:inline-block; width:0.5em; animation: caretBlink 1s step-end infinite; }
  @keyframes caretBlink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ---- Toast (createElement in JS) ---- */
  #toast {
    position: fixed; left: 12px; right: 12px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    z-index: 2000; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none; max-width: 536px; margin: 0 auto;
  }
  .toast-item {
    background: var(--color-error); color: var(--color-error-content);
    padding: 12px 14px; border-radius: var(--radius-box, 0.5rem);
    font-size: 14px; font-weight: 600; box-shadow: 0 6px 22px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.2s ease, transform 0.2s ease; word-break: break-word;
  }
  .toast-item.show { opacity: 1; transform: translateY(0); }
  .toast-item.info { background: var(--color-info); color: var(--color-info-content); }

  /* ---- Marker tracking box (dx/dy dot positioned via JS) ---- */
  #markerBox { position: relative; overflow: hidden; }
  #markerPos {
    position: absolute; width: 10px; height: 10px; margin: -5px 0 0 -5px;
    border-radius: 50%; background: var(--color-base-content); opacity: 0;
    transition: opacity 0.15s ease, left 0.1s linear, top 0.1s linear;
  }
  #markerPos.found { background: var(--color-success); opacity: 1; box-shadow: 0 0 6px var(--color-success); }
</style>
</head>
<body class="max-w-[560px] mx-auto px-3 pb-6 bg-base-100 text-base-content min-h-screen" style="padding-top: calc(env(safe-area-inset-top, 0px) + 56px);">

  <!-- Fixed status header (always visible) -->
  <div id="topbar" class="fixed top-0 left-0 right-0 z-[1000] pb-2 bg-base-200/95 backdrop-blur border-b border-base-300">
    <div id="statusRow" class="flex items-center gap-2 min-h-5 max-w-[560px] mx-auto px-3 py-1">
      <span class="badge badge-ghost gap-1.5"><span id="connDot" class="dot"></span><span id="connText">연결 끊김</span></span>
      <span class="badge badge-ghost gap-1.5"><span id="devDot" class="dot off"></span><span id="devText">드론 오프라인</span></span>
      <span class="badge badge-ghost gap-1 ml-auto">🔋 <span id="battText">—</span></span>
    </div>
  </div>

  <!-- Emergency (top of page, above Connection) -->
  <button id="emergencyBtn" type="button" class="btn btn-error btn-block h-16 flex-col gap-0.5 text-xl font-extrabold uppercase tracking-wider mb-3.5">
    비상 착륙
    <small class="block text-[11px] font-semibold tracking-normal opacity-85 normal-case">눌러서 즉시 착륙 &middot; 하드웨어 버튼이 진짜 최후 수단</small>
  </button>

  <!-- Marker tracking -->
  <div class="card card-border bg-base-200 mb-3.5">
    <div class="card-body p-3.5 gap-2.5">
      <h2 class="card-title text-xs uppercase tracking-wider opacity-60">마커 추적</h2>
      <div class="flex items-center gap-2.5">
        <button id="trackBtn" type="button" class="btn btn-outline btn-primary flex-1" disabled>마커 추적 시작</button>
        <span class="badge badge-ghost gap-1.5"><span id="trackDot" class="dot"></span><span id="trackText">추적 꺼짐</span></span>
      </div>
      <div class="flex items-center gap-3.5">
        <div id="markerBox" class="bg-base-300 rounded-box shrink-0" style="width:80px;height:80px;">
          <div id="markerPos" style="left:50%;top:50%;"></div>
        </div>
        <div class="text-xs leading-relaxed opacity-80">
          <div class="flex items-center gap-1.5"><span id="markerDot" class="dot"></span><span id="markerText">—</span></div>
          <div id="markerIdText">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Connection -->
  <div class="card card-border bg-base-200 mb-3.5">
    <div class="card-body p-3.5 gap-2.5">
      <h2 class="card-title text-xs uppercase tracking-wider opacity-60">연결</h2>
      <div class="flex gap-2">
        <input id="tokenInput" type="text" inputmode="text" autocomplete="off" autocapitalize="off"
               autocorrect="off" spellcheck="false" placeholder="브라우저 토큰" class="input flex-1 min-w-0" />
        <button id="connectBtn" class="btn btn-primary" type="button">연결</button>
      </div>
    </div>
  </div>

  <!-- Voice -->
  <div class="card card-border bg-base-200 mb-3.5">
    <div class="card-body p-3.5 gap-2.5">
      <h2 class="card-title text-xs uppercase tracking-wider opacity-60">음성</h2>
      <button id="micBtn" type="button" class="btn btn-outline btn-primary btn-block h-32 flex-col gap-1.5 text-xl normal-case">
        <span id="micLabel">🎤 눌러서 말하기</span>
        <span class="text-xs font-normal opacity-60" id="micSub">누른 채로 말하고, 떼면 전송</span>
      </button>
    </div>
  </div>

  <!-- Direct controls -->
  <div class="card card-border bg-base-200 mb-3.5">
    <div class="card-body p-3.5 gap-2.5">
      <h2 class="card-title text-xs uppercase tracking-wider opacity-60">직접 제어</h2>

      <div class="grid grid-cols-3 gap-2.5">
        <button class="btn btn-success" id="btnTakeoff" type="button">이륙</button>
        <button class="btn btn-warning" id="btnLand"    type="button">착륙</button>
        <button class="btn btn-info"    id="btnBattery" type="button">배터리</button>
      </div>

      <div class="text-[11px] uppercase tracking-wider opacity-60 mt-1">이동</div>
      <div class="flex items-center gap-2.5 text-sm opacity-80">
        <label for="distNum">거리</label>
        <input id="distNum" type="number" min="20" max="500" step="10" value="50" class="input input-sm w-24" />
        <span>cm</span>
        <input id="distRange" type="range" min="20" max="500" step="10" value="50" class="range range-sm flex-1" />
      </div>

      <div class="grid grid-cols-3 grid-rows-3 gap-2.5">
        <button class="btn btn-neutral h-14 col-start-2 row-start-1" data-move="forward" type="button">▲ 전진</button>
        <button class="btn btn-neutral h-14 col-start-1 row-start-2" data-move="left"    type="button">◀ 왼쪽</button>
        <button class="btn btn-neutral h-14 col-start-3 row-start-2" data-move="right"   type="button">오른쪽 ▶</button>
        <button class="btn btn-neutral h-14 col-start-2 row-start-3" data-move="back"    type="button">▼ 후진</button>
      </div>

      <div class="grid grid-cols-2 gap-2.5">
        <button class="btn btn-neutral" data-move="up"   type="button">⤒ 상승</button>
        <button class="btn btn-neutral" data-move="down" type="button">⤓ 하강</button>
      </div>

      <div class="text-[11px] uppercase tracking-wider opacity-60 mt-1">회전</div>
      <div class="flex items-center gap-2.5 text-sm opacity-80">
        <label for="degNum">각도</label>
        <input id="degNum" type="number" min="1" max="360" step="5" value="90" class="input input-sm w-24" />
        <span>&deg;</span>
        <input id="degRange" type="range" min="1" max="360" step="5" value="90" class="range range-sm flex-1" />
      </div>
      <div class="grid grid-cols-2 gap-2.5">
        <button class="btn btn-neutral" data-rot="ccw" type="button">↺ 반시계</button>
        <button class="btn btn-neutral" data-rot="cw"  type="button">시계 ↻</button>
      </div>
    </div>
  </div>

  <!-- Log -->
  <div class="card card-border bg-base-200 mb-3.5">
    <div class="card-body p-3.5 gap-2.5">
      <h2 class="card-title text-xs uppercase tracking-wider opacity-60">명령 로그</h2>
      <div id="log" role="log" aria-live="polite" class="h-60 overflow-y-auto bg-base-300 rounded-box p-2 font-mono text-xs leading-relaxed"></div>
    </div>
  </div>

  <div id="toast"></div>

<script>
"use strict";
(function () {
  // ---- Limits (mirror of LIMITS in src/protocol.ts) ----
  var DIST_MIN = 20, DIST_MAX = 500;
  var DEG_MIN = 1, DEG_MAX = 360;
  var PING_MS = 10000;
  var RECONNECT_MIN = 1000, RECONNECT_MAX = 15000;

  // ---- Elements ----
  var $ = function (id) { return document.getElementById(id); };
  var connDot = $("connDot"), connText = $("connText");
  var devDot = $("devDot"), devText = $("devText");
  var battText = $("battText");
  var tokenInput = $("tokenInput"), connectBtn = $("connectBtn");
  var micBtn = $("micBtn"), micLabel = $("micLabel"), micSub = $("micSub");
  var distNum = $("distNum"), distRange = $("distRange");
  var degNum = $("degNum"), degRange = $("degRange");
  var logEl = $("log"), toastEl = $("toast");

  // ---- Marker tracking ----
  var trackBtn = $("trackBtn"), trackDot = $("trackDot"), trackText = $("trackText");
  var markerDot = $("markerDot"), markerText = $("markerText"), markerIdText = $("markerIdText");
  var markerPos = $("markerPos");
  var deviceOnline = false;
  var trackingActive = false;

  // ================= WebSocket =================
  var ws = null;
  var reconnectDelay = RECONNECT_MIN;
  var reconnectTimer = null;
  var pingTimer = null;
  var manualClose = false;

  function tokenFromUrl() {
    try {
      var p = new URLSearchParams(window.location.search).get("token");
      return p ? p.trim() : "";
    } catch (e) { return ""; }
  }

  // Persist the browser token in a cookie so it auto-loads next visit.
  var TOKEN_COOKIE = "tv_token";
  function saveToken(t) {
    try {
      var secure = window.location.protocol === "https:" ? "; Secure" : "";
      // 1 year; Lax so it rides same-site navigations.
      document.cookie = TOKEN_COOKIE + "=" + encodeURIComponent(t) +
        "; Max-Age=31536000; Path=/; SameSite=Lax" + secure;
    } catch (e) { /* ignore */ }
  }
  function loadTokenCookie() {
    try {
      var m = document.cookie.match(/(?:^|;\s*)tv_token=([^;]*)/);
      return m ? decodeURIComponent(m[1]).trim() : "";
    } catch (e) { return ""; }
  }

  function currentToken() { return tokenInput.value.trim(); }

  function wsUrl(token) {
    var proto = window.location.protocol === "https:" ? "wss:" : "ws:";
    return proto + "//" + window.location.host + "/ws/browser?token=" + encodeURIComponent(token);
  }

  var CONN_LABELS = {
    connected: "연결됨",
    connecting: "연결 중\u2026",
    reconnecting: "재연결 중\u2026",
    disconnected: "연결 끊김"
  };
  function setConn(state, label) {
    connText.textContent = label || CONN_LABELS[state] || state;
    connDot.className = "dot";
    if (state === "connected") connDot.classList.add("on");
    else if (state === "connecting" || state === "reconnecting") connDot.classList.add("warn");
    else connDot.classList.add("off");
  }

  function clearReconnect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  }

  function scheduleReconnect() {
    clearReconnect();
    var secs = Math.round(reconnectDelay / 1000);
    setConn("reconnecting", "재연결 중 " + secs + "초\u2026");
    reconnectTimer = setTimeout(function () {
      reconnectTimer = null;
      if (!manualClose) connect();
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
  }

  function connect() {
    clearReconnect();
    var token = currentToken();
    if (!token) { setConn("disconnected", "토큰을 입력하세요"); return; }

    // Tear down any existing socket first.
    if (ws) {
      try { ws.onclose = null; ws.onerror = null; ws.onmessage = null; ws.onopen = null; ws.close(); }
      catch (e) { /* ignore */ }
      ws = null;
    }
    stopPing();

    manualClose = false;
    setConn("connecting");
    try {
      ws = new WebSocket(wsUrl(token));
    } catch (e) {
      logLine("err", "연결 실패: " + (e && e.message ? e.message : e));
      scheduleReconnect();
      return;
    }

    ws.onopen = function () {
      reconnectDelay = RECONNECT_MIN;
      setConn("connected");
      logLine("info", "백엔드에 연결됨");
      saveToken(currentToken()); // remember a working token for next visit
      startPing();
    };
    ws.onmessage = function (ev) { handleMessage(ev.data); };
    ws.onerror = function () { /* onclose follows; surface only there */ };
    ws.onclose = function (ev) {
      stopPing();
      if (manualClose) { setConn("disconnected", "연결 끊김"); return; }
      // 1008 (policy) from the server most likely means a bad token.
      if (ev && ev.code === 1008) {
        setConn("disconnected", "인증 거부됨");
        toast("연결이 거부되었습니다 \u2014 토큰을 확인하세요.");
        return; // do not hammer with a bad token
      }
      setConn("disconnected", "연결 끊김");
      scheduleReconnect();
    };
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      try { ws.send(JSON.stringify(msg)); return true; }
      catch (e) { toast("전송 실패: " + (e && e.message ? e.message : e)); return false; }
    }
    toast("연결되지 않음 \u2014 먼저 연결을 누르세요.");
    return false;
  }

  function startPing() {
    stopPing();
    pingTimer = setInterval(function () {
      if (ws && ws.readyState === WebSocket.OPEN) {
        try { ws.send(JSON.stringify({ type: "ping" })); } catch (e) { /* ignore */ }
      }
    }, PING_MS);
  }
  function stopPing() { if (pingTimer) { clearInterval(pingTimer); pingTimer = null; } }

  // ================= Incoming messages =================
  function handleMessage(raw) {
    var msg;
    try { msg = JSON.parse(raw); } catch (e) { return; }
    if (!msg || typeof msg.type !== "string") return;

    switch (msg.type) {
      case "transcript":
        logLine("info", "인식: \u201c" + String(msg.text == null ? "" : msg.text) + "\u201d");
        break;

      case "parsed":
        logParsed(msg);
        break;

      case "tello":
        logTello(msg);
        break;

      case "status":
        updateStatus(msg);
        break;

      case "tracking":
        updateTracking(msg);
        break;

      case "error":
        stopProcessing();
        logLine("err", "오류: " + String(msg.message == null ? "" : msg.message));
        toast(String(msg.message == null ? "오류" : msg.message));
        break;

      case "pong":
        break; // liveness only

      default:
        break;
    }
  }

  function updateStatus(msg) {
    var online = !!msg.deviceOnline;
    deviceOnline = online;
    devDot.className = "dot " + (online ? "on" : "off");
    devText.textContent = online ? "드론 온라인" : "드론 오프라인";
    if (typeof msg.battery === "number") {
      battText.textContent = msg.battery + "%";
    } else {
      battText.textContent = "\u2014";
    }
    updateTrackEnabled();
  }

  function clampUnit(n) {
    if (typeof n !== "number" || isNaN(n)) return 0.5;
    if (n < -1) return -1;
    if (n > 1) return 1;
    return n;
  }

  function updateTracking(msg) {
    var active = !!msg.active;
    trackingActive = active;
    trackDot.className = "dot" + (active ? " on" : "");
    trackText.textContent = active ? "추적 켜짐" : "추적 꺼짐";
    trackBtn.textContent = active ? "마커 추적 중지" : "마커 추적 시작";
    trackBtn.classList.toggle("btn-error", active);
    trackBtn.classList.toggle("btn-outline", !active);
    trackBtn.classList.toggle("btn-primary", !active);

    if (!active) {
      markerDot.className = "dot";
      markerText.textContent = "\u2014";
      markerIdText.textContent = "\u2014";
      markerPos.classList.remove("found");
      updateTrackEnabled();
      return;
    }

    var found = !!msg.markerFound;
    markerDot.className = "dot " + (found ? "on" : "off");
    markerText.textContent = found ? "마커 발견" : "마커 없음";
    markerIdText.textContent = (found && typeof msg.markerId === "number") ? ("ID " + msg.markerId) : "\u2014";

    if (found && typeof msg.dx === "number" && typeof msg.dy === "number") {
      markerPos.style.left = ((clampUnit(msg.dx) + 1) / 2 * 100) + "%";
      markerPos.style.top = ((clampUnit(msg.dy) + 1) / 2 * 100) + "%";
      markerPos.classList.add("found");
    } else {
      markerPos.classList.remove("found");
    }

    updateTrackEnabled();
  }

  function updateTrackEnabled() {
    trackBtn.disabled = !deviceOnline;
  }

  function logParsed(msg) {
    stopProcessing(); // clear the "인식 중" indicator
    var raw = msg.raw == null ? "" : String(msg.raw);
    var cmd = fmtCmd(msg.command);
    // Build the line, then type the raw echo in, then reveal the → command.
    var div = document.createElement("div");
    div.className = "logline parse";
    div.innerHTML = tsStamp() + "해석: <span class=\"typed\"></span>";
    appendLine(div);
    var typed = div.querySelector(".typed");
    typeInto(typed, raw, function () {
      var tail = document.createElement("span");
      tail.innerHTML = "  \u2192  <span class=\"cmd\">" + esc(cmd) + "</span>";
      div.appendChild(tail);
      logEl.scrollTop = logEl.scrollHeight;
    });
  }

  function logTello(msg) {
    var cmd = fmtCmd(msg.command);
    var resp = msg.response == null ? "" : String(msg.response);
    var cls = msg.ok ? "ok" : "fail";
    var mark = msg.ok ? "\u2713" : "\u2717";
    logLine(cls, mark + " " + cmd + " \u2192 " + resp);
  }

  // ================= Outgoing commands =================
  function sendCommand(command) {
    if (send({ type: "command", command: command })) {
      logLine("sent", "\u2192 " + fmtCmd(command));
    }
  }

  function fmtCmd(c) {
    if (!c || typeof c.action !== "string") return "?";
    var s = c.action;
    if (typeof c.distance === "number") s += " " + c.distance + "cm";
    if (typeof c.degree === "number") s += " " + c.degree + "\u00b0";
    if (c.dir) s += " " + c.dir;
    return s;
  }

  function clampInt(v, min, max, def) {
    var n = parseInt(v, 10);
    if (isNaN(n)) n = def;
    if (n < min) n = min;
    if (n > max) n = max;
    return n;
  }

  function currentDistance() {
    var n = clampInt(distNum.value, DIST_MIN, DIST_MAX, 50);
    distNum.value = n; distRange.value = n;
    return n;
  }
  function currentDegree() {
    var n = clampInt(degNum.value, DEG_MIN, DEG_MAX, 90);
    degNum.value = n; degRange.value = n;
    return n;
  }

  // ================= Mic / MediaRecorder =================
  var micStream = null;
  var recorder = null;
  var chunks = [];
  var recState = "idle"; // idle | starting | recording | stopping

  function micSupported() {
    return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  function setMicUI() {
    micBtn.classList.remove("recording", "starting");
    // daisyUI btn locks bg/border/color via !important layers, so swap the
    // color classes themselves for the recording state instead of overriding.
    micBtn.classList.remove("btn-outline", "btn-primary", "btn-error");
    if (recState === "recording") {
      micBtn.classList.add("recording", "btn-error");
      micLabel.textContent = "\u25cf 녹음 중\u2026";
      micSub.textContent = "떼면 전송";
    } else if (recState === "starting" || recState === "stopping") {
      micBtn.classList.add("starting", "btn-outline", "btn-primary");
      micLabel.textContent = recState === "starting" ? "\u2026 시작 중" : "\u2026 전송 중";
      micSub.textContent = "";
    } else {
      micBtn.classList.add("btn-outline", "btn-primary");
      micLabel.textContent = "\uD83C\uDFA4 눌러서 말하기";
      micSub.textContent = "누른 채로 말하고, 떼면 전송";
    }
  }

  function ensureStream() {
    if (micStream) return Promise.resolve(micStream);
    return navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
      micStream = s;
      return s;
    });
  }

  function startRecording() {
    if (recState !== "idle") return;
    if (!micSupported()) {
      toast("마이크를 사용할 수 없습니다. HTTPS와 지원되는 브라우저가 필요합니다.");
      logLine("err", "getUserMedia/MediaRecorder 미지원 (비보안 컨텍스트?)");
      return;
    }
    recState = "starting";
    setMicUI();

    ensureStream().then(function (stream) {
      // Released before the mic came up? Abort cleanly.
      if (recState !== "starting") { recState = "idle"; setMicUI(); return; }

      chunks = [];
      try {
        recorder = new MediaRecorder(stream);
      } catch (e1) {
        recState = "idle"; setMicUI();
        toast("이 브라우저는 녹음을 지원하지 않습니다.");
        logLine("err", "MediaRecorder 초기화 실패: " + (e1 && e1.message ? e1.message : e1));
        return;
      }

      recorder.ondataavailable = function (ev) {
        if (ev.data && ev.data.size > 0) chunks.push(ev.data);
      };
      recorder.onstop = function () {
        var type = recorder.mimeType || (chunks[0] && chunks[0].type) || "audio/webm";
        var blob = new Blob(chunks, { type: type });
        chunks = [];
        recState = "idle";
        setMicUI();
        if (blob.size === 0) { toast("녹음된 내용이 없습니다 \u2014 조금 더 길게 누르세요."); return; }
        sendAudioBlob(blob);
      };
      recorder.onerror = function (ev) {
        recState = "idle"; setMicUI();
        var m = ev && ev.error && ev.error.message ? ev.error.message : "녹음 오류";
        toast("녹음 오류: " + m);
        logLine("err", "녹음 오류: " + m);
      };

      try {
        recorder.start();
        recState = "recording";
        setMicUI();
      } catch (e) {
        recState = "idle"; setMicUI();
        toast("녹음을 시작할 수 없습니다: " + (e && e.message ? e.message : e));
      }
    }).catch(function (err) {
      recState = "idle";
      setMicUI();
      var name = err && err.name ? err.name : "";
      var msg;
      if (name === "NotAllowedError" || name === "SecurityError") {
        msg = "마이크 권한이 거부되었습니다. 마이크 접근을 허용하세요 (HTTPS 필요).";
      } else if (name === "NotFoundError" || name === "DevicesNotFoundError") {
        msg = "이 기기에서 마이크를 찾을 수 없습니다.";
      } else {
        msg = "마이크를 사용할 수 없습니다: " + (err && err.message ? err.message : name || err) +
              ". 보안(HTTPS) 컨텍스트와 마이크 권한이 필요합니다.";
      }
      toast(msg);
      logLine("err", msg);
    });
  }

  function stopRecording() {
    if (recState === "starting") {
      // Released before the stream came up — cancel.
      recState = "idle";
      setMicUI();
      return;
    }
    if (recState === "recording" && recorder && recorder.state !== "inactive") {
      recState = "stopping";
      setMicUI();
      try { recorder.stop(); } catch (e) { recState = "idle"; setMicUI(); }
    }
  }

  function sendAudioBlob(blob) {
    var reader = new FileReader();
    reader.onload = function () {
      var result = reader.result || "";
      var comma = String(result).indexOf(",");
      var b64 = comma >= 0 ? String(result).slice(comma + 1) : String(result);
      var mime = blob.type || (recorder && recorder.mimeType) || "audio/webm";
      if (send({ type: "audio", mime: mime, audio: b64 })) {
        logLine("sent", "\uD83C\uDFA4 오디오 전송 (" + mime + ", " + Math.round(blob.size / 1024) + " KB)");
        startProcessing(); // live "인식 중" until parsed/error arrives
      }
    };
    reader.onerror = function () {
      toast("녹음을 읽지 못했습니다.");
      logLine("err", "FileReader 오류");
    };
    reader.readAsDataURL(blob);
  }

  // ================= Log & toast =================
  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function tsStamp() {
    var ts = new Date();
    var hh = ("0" + ts.getHours()).slice(-2);
    var mm = ("0" + ts.getMinutes()).slice(-2);
    var ss = ("0" + ts.getSeconds()).slice(-2);
    return "<span class=\"t\">" + hh + ":" + mm + ":" + ss + "</span> ";
  }

  function appendLine(div) {
    var atBottom = (logEl.scrollTop + logEl.clientHeight) >= (logEl.scrollHeight - 24);
    logEl.appendChild(div);
    while (logEl.childNodes.length > 200) logEl.removeChild(logEl.firstChild);
    if (atBottom) logEl.scrollTop = logEl.scrollHeight;
  }

  function logLine(cls, text, isHtml) {
    var div = document.createElement("div");
    div.className = "logline " + cls;
    div.innerHTML = tsStamp() + (isHtml ? text : esc(text));
    appendLine(div);
    return div;
  }

  // ---- "처리 중" live indicator while the backend runs Gemini ----
  var pendingEl = null, pendingTimer = null;
  function startProcessing() {
    stopProcessing();
    var div = document.createElement("div");
    div.className = "logline info";
    var dots = document.createElement("span");
    div.innerHTML = tsStamp() + "\uD83E\uDDE0 인식 중";
    div.appendChild(dots);
    appendLine(div);
    pendingEl = div;
    var n = 0;
    pendingTimer = setInterval(function () {
      n = (n + 1) % 4;
      dots.textContent = new Array(n + 1).join("\u00b7"); // ·, ··, ···
    }, 350);
  }
  function stopProcessing() {
    if (pendingTimer) { clearInterval(pendingTimer); pendingTimer = null; }
    if (pendingEl && pendingEl.parentNode) pendingEl.parentNode.removeChild(pendingEl);
    pendingEl = null;
  }

  // ---- Typewriter render of a parsed result ----
  function typeInto(span, text, done) {
    var i = 0;
    var caret = document.createElement("span");
    caret.className = "caret";
    caret.textContent = "\u2588";
    span.parentNode.insertBefore(caret, span.nextSibling);
    var step = Math.max(12, Math.min(45, Math.round(600 / Math.max(1, text.length))));
    var atBottom = true;
    var timer = setInterval(function () {
      if (i >= text.length) {
        clearInterval(timer);
        if (caret.parentNode) caret.parentNode.removeChild(caret);
        if (done) done();
        return;
      }
      span.textContent += text.charAt(i++);
      if (atBottom) logEl.scrollTop = logEl.scrollHeight;
    }, step);
  }

  function toast(message, kind) {
    var item = document.createElement("div");
    item.className = "toast-item" + (kind === "info" ? " info" : "");
    item.textContent = message;
    toastEl.appendChild(item);
    // force reflow so the transition runs
    void item.offsetWidth;
    item.classList.add("show");
    setTimeout(function () {
      item.classList.remove("show");
      setTimeout(function () { if (item.parentNode) item.parentNode.removeChild(item); }, 250);
    }, 4200);
  }

  // ================= Wire up UI =================

  // Emergency LAND — immediate, distinct from normal land.
  $("emergencyBtn").addEventListener("click", function () {
    sendCommand({ action: "land" });
    logLine("err", "비상 착륙 전송됨");
  });

  // Connection
  connectBtn.addEventListener("click", function () {
    reconnectDelay = RECONNECT_MIN;
    connect();
  });
  tokenInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { reconnectDelay = RECONNECT_MIN; connect(); }
  });

  // Basic commands
  $("btnTakeoff").addEventListener("click", function () { sendCommand({ action: "takeoff" }); });
  $("btnLand").addEventListener("click", function () { sendCommand({ action: "land" }); });
  $("btnBattery").addEventListener("click", function () { sendCommand({ action: "battery" }); });

  // Marker tracking toggle — the server's `active` field in the "tracking"
  // message is the source of truth for the button's displayed state (see
  // updateTracking), so this just requests the opposite of the last known
  // state rather than driving a separate local click-toggle flag.
  trackBtn.addEventListener("click", function () {
    var wantOn = !trackingActive;
    if (send({ type: "track", on: wantOn })) {
      logLine("sent", "\u2192 마커 추적 " + (wantOn ? "시작" : "중지"));
    }
  });

  // Directional moves
  var moveButtons = document.querySelectorAll("[data-move]");
  for (var i = 0; i < moveButtons.length; i++) {
    (function (btn) {
      btn.addEventListener("click", function () {
        var action = btn.getAttribute("data-move");
        sendCommand({ action: action, distance: currentDistance() });
      });
    })(moveButtons[i]);
  }

  // Rotation
  var rotButtons = document.querySelectorAll("[data-rot]");
  for (var j = 0; j < rotButtons.length; j++) {
    (function (btn) {
      btn.addEventListener("click", function () {
        var action = btn.getAttribute("data-rot");
        sendCommand({ action: action, degree: currentDegree() });
      });
    })(rotButtons[j]);
  }

  // Keep number/range selectors in sync.
  function syncPair(numEl, rangeEl, min, max) {
    numEl.addEventListener("input", function () { rangeEl.value = numEl.value; });
    numEl.addEventListener("change", function () {
      var n = clampInt(numEl.value, min, max, numEl === distNum ? 50 : 90);
      numEl.value = n; rangeEl.value = n;
    });
    rangeEl.addEventListener("input", function () { numEl.value = rangeEl.value; });
  }
  syncPair(distNum, distRange, DIST_MIN, DIST_MAX);
  syncPair(degNum, degRange, DEG_MIN, DEG_MAX);

  // Push-to-talk (pointer events cover mouse + touch + pen).
  micBtn.addEventListener("pointerdown", function (e) {
    e.preventDefault();
    try { micBtn.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
    startRecording();
  });
  micBtn.addEventListener("pointerup", function (e) {
    e.preventDefault();
    stopRecording();
  });
  micBtn.addEventListener("pointercancel", function () { stopRecording(); });
  // Safety: if pointer leaves without capture (older engines), stop.
  micBtn.addEventListener("pointerleave", function () {
    if (recState === "recording" || recState === "starting") stopRecording();
  });
  // Block context menu on long-press.
  micBtn.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  if (!micSupported()) {
    micBtn.disabled = true;
    micLabel.textContent = "\uD83C\uDFA4 마이크 사용 불가";
    micSub.textContent = "HTTPS + 마이크 권한 필요";
    logLine("err", "마이크 API 사용 불가 (비보안 컨텍스트 또는 미지원 브라우저).");
  }

  // ================= Boot =================
  setMicUI();
  logLine("info", "준비됨. " + (window.location.protocol === "https:" ? "보안 컨텍스트" : "비보안 컨텍스트 \u2014 마이크가 차단될 수 있음"));

  // Token priority: URL ?token= (explicit) > saved cookie (auto-load).
  var bootToken = tokenFromUrl() || loadTokenCookie();
  if (bootToken) {
    tokenInput.value = bootToken;
    connect();
  } else {
    setConn("disconnected", "토큰 입력");
    tokenInput.focus();
  }

  // Reconnect promptly when the tab regains focus / network returns.
  window.addEventListener("online", function () {
    if (!ws || ws.readyState === WebSocket.CLOSED) { reconnectDelay = RECONNECT_MIN; connect(); }
  });
  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" &&
        (!ws || ws.readyState === WebSocket.CLOSED) && currentToken()) {
      reconnectDelay = RECONNECT_MIN;
      connect();
    }
  });
})();
</script>
</body>
</html>
